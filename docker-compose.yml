# Desarrollo local: monta el código y usa --reload en la API.
# Redis arranca siempre: la caché LLM usa el hostname `redis` en la red de Compose
# (no `localhost`, que dentro del contenedor apunta al propio contenedor).
#
# Solo API + Redis: docker compose up --build
# Con Streamlit: docker compose --profile ui up --build
# RedisInsight: http://localhost:8001

services:
  redis:
    # Redis Stack incluye RedisInsight (puerto 8001) y módulos RediSearch/RedisJSON.
    image: redis/redis-stack:7.4.0-v0
    container_name: lidr-estimator-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI → http://localhost:8001
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  estimator:
    build: .
    container_name: lidr-estimator
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sustituye REDIS_URL del .env (localhost) por el servicio en la red Docker.
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./streamlit_app.py:/app/streamlit_app.py
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  streamlit:
    profiles: [ui]
    build: .
    container_name: lidr-estimator-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      ESTIMATOR_API_BASE_URL: http://estimator:8000
    depends_on:
      redis:
        condition: service_healthy
      estimator:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./streamlit_app.py:/app/streamlit_app.py
    command: >
      sh -c "find /app/app -type d -name __pycache__ -prune -exec rm -rf {} + 2>/dev/null || true;
      exec streamlit run /app/streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501"
    restart: unless-stopped

volumes:
  redis_data:
