# Desarrollo local: monta el código y usa --reload en la API.
# Para producción, quita los volúmenes y la opción `--reload`.
#
# Solo API: docker compose up --build
# API + Redis (caché LLM): docker compose --profile redis up --build
# API + Streamlit: docker compose --profile ui up --build
# Todo junto: docker compose --profile redis --profile ui up --build

services:
  redis:
    # ECR Public (Amazon) evita pulls por CDN de Docker Hub que pueden fallar TLS en algunas redes.
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: lidr-estimator-redis
    profiles: [redis]
    ports:
      - "6379:6379"
    restart: unless-stopped

  estimator:
    build: .
    container_name: lidr-estimator
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./streamlit_app.py:/app/streamlit_app.py
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  streamlit:
    profiles: [ui]
    build: .
    container_name: lidr-estimator-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./streamlit_app.py:/app/streamlit_app.py
    command: >
      streamlit run /app/streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501
    restart: unless-stopped
