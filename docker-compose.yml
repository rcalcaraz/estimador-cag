# Desarrollo local: monta el código y usa --reload en la API.
# Para producción, quita los volúmenes y la opción --reload.
#
# Solo API: docker compose up --build
# API + interfaz Streamlit: docker compose --profile ui up --build

services:
  estimator:
    build: .
    container_name: lidr-estimator
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./streamlit_app.py:/app/streamlit_app.py
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  streamlit:
    profiles: [ui]
    build: .
    container_name: lidr-estimator-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./streamlit_app.py:/app/streamlit_app.py
    command: >
      streamlit run /app/streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501
    restart: unless-stopped
